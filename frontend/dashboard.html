<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – TeamTasker</title>
  <meta name="description" content="Overview of your projects, tasks, and team activity." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="bg-mesh"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="nav-brand" href="/dashboard.html">
      <span class="icon">🚀</span> TeamTasker
    </a>
    <div class="nav-right">
      <div class="nav-user">
        <div class="avatar" id="nav-avatar">?</div>
        <span id="nav-username">Loading…</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="page">
    <div class="container">
      <div class="page-header fade-up">
        <div>
          <h1 class="page-title">📊 Dashboard</h1>
          <p id="dash-greeting" style="margin-top:4px;"></p>
        </div>
        <button class="btn btn-primary" onclick="openModal('modal-new-project')" id="btn-new-project">
          ＋ New Project
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-grid stagger" id="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">📁</div>
          <div class="stat-label">My Projects</div>
          <div class="stat-value" id="stat-projects">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📋</div>
          <div class="stat-label">Total Tasks</div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⚡</div>
          <div class="stat-label">In Progress</div>
          <div class="stat-value" id="stat-progress">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div class="stat-label">Completed</div>
          <div class="stat-value" id="stat-done">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🔴</div>
          <div class="stat-label">Overdue</div>
          <div class="stat-value" id="stat-overdue" style="color:var(--danger)">—</div>
        </div>
      </div>

      <!-- Charts + Recent -->
      <div style="display:grid;grid-template-columns:1fr 1.6fr;gap:20px;margin-top:24px;" class="chart-layout">
        <div class="glass" style="padding:22px;">
          <h3 style="margin-bottom:16px;">👤 Tasks per Member</h3>
          <div id="chart-tasks-per-user" class="chart-bar-wrap">
            <div class="page-loader"><div class="spinner"></div></div>
          </div>
        </div>
        <div class="glass" style="padding:22px;overflow-x:auto;">
          <h3 style="margin-bottom:16px;">🕐 Recent Tasks</h3>
          <div id="recent-tasks-wrap">
            <div class="page-loader"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- Projects -->
      <div class="section">
        <div class="section-header">
          <h2>My Projects</h2>
          <span id="projects-count" style="font-size:0.85rem;color:var(--text-muted);"></span>
        </div>
        <div class="projects-grid stagger" id="projects-grid">
          <div class="page-loader" style="grid-column:1/-1;"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- New Project Modal -->
  <div class="modal-overlay hidden" id="modal-new-project">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">✨ New Project</span>
        <button class="modal-close" onclick="closeModal('modal-new-project')">✕</button>
      </div>
      <form class="modal-body" id="form-new-project" onsubmit="handleCreateProject(event)">
        <div class="form-group">
          <label class="form-label">Project Name *</label>
          <input class="form-input" id="proj-name" type="text" placeholder="e.g. Marketing Redesign" required />
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="proj-desc" placeholder="What is this project about?"></textarea>
        </div>
        <div class="modal-footer" style="margin-top:0;">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modal-new-project')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-create-proj">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');

    const user = getUser();
    if (user) {
      document.getElementById('nav-avatar').textContent = avatarInitials(user.name);
      document.getElementById('nav-username').textContent = user.name;
      const hr = new Date().getHours();
      const greet = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
      document.getElementById('dash-greeting').textContent = `${greet}, ${user.name}! Here's your overview.`;
    }

    async function loadDashboard() {
      try {
        const data = await Dashboard.stats();
        document.getElementById('stat-projects').textContent = data.my_projects;
        document.getElementById('stat-total').textContent = data.total_tasks;
        document.getElementById('stat-progress').textContent = data.by_status.in_progress;
        document.getElementById('stat-done').textContent = data.by_status.done;
        document.getElementById('stat-overdue').textContent = data.overdue;

        // Chart
        const chartEl = document.getElementById('chart-tasks-per-user');
        if (!data.tasks_per_user.length) {
          chartEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No assignment data yet</div></div>';
        } else {
          const max = Math.max(...data.tasks_per_user.map(r => r.task_count));
          chartEl.innerHTML = data.tasks_per_user.map(r => `
            <div class="chart-bar-row">
              <div class="chart-bar-label" title="${r.name}">${r.name}</div>
              <div class="chart-bar-track">
                <div class="chart-bar-fill" style="width:${(r.task_count/max)*100}%"></div>
              </div>
              <div class="chart-bar-count">${r.task_count}</div>
            </div>`).join('');
        }

        // Recent Tasks
        const recentEl = document.getElementById('recent-tasks-wrap');
        if (!data.recent_tasks.length) {
          recentEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No tasks yet</div></div>';
        } else {
          recentEl.innerHTML = `
            <table class="task-table">
              <thead><tr>
                <th>Task</th><th>Project</th><th>Status</th><th>Priority</th><th>Due</th>
              </tr></thead>
              <tbody>
                ${data.recent_tasks.map(t => `
                  <tr>
                    <td style="font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.title}</td>
                    <td style="color:var(--text-muted);font-size:0.8rem;">${t.project_name}</td>
                    <td>${statusBadge(t.status)}</td>
                    <td>${priorityBadge(t.priority)}</td>
                    <td class="${isOverdue(t.due_date, t.status) ? 'task-card-due overdue' : 'task-card-due'}">${formatDate(t.due_date)}</td>
                  </tr>`).join('')}
              </tbody>
            </table>`;
        }
      } catch (err) {
        toast('Failed to load dashboard: ' + err.message, 'error');
      }
    }

    async function loadProjects() {
      try {
        const { projects } = await Projects.list();
        const grid = document.getElementById('projects-grid');
        document.getElementById('projects-count').textContent = `${projects.length} project${projects.length !== 1 ? 's' : ''}`;
        if (!projects.length) {
          grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">📁</div>
            <div class="empty-title">No projects yet</div>
            <div class="empty-desc">Create your first project to get started!</div>
          </div>`;
          return;
        }
        grid.innerHTML = projects.map(p => `
          <a class="project-card" href="/project.html?id=${p.id}" id="proj-card-${p.id}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div class="project-card-name">${p.name}</div>
              <span class="badge badge-${p.my_role}">${p.my_role}</span>
            </div>
            <div class="project-card-desc">${p.description || 'No description provided.'}</div>
            <div class="project-card-meta">
              <span>📋 ${p.task_count} task${p.task_count !== 1 ? 's' : ''}</span>
              <span>👥 ${p.member_count} member${p.member_count !== 1 ? 's' : ''}</span>
              <span>📅 ${formatDate(p.created_at)}</span>
            </div>
          </a>`).join('');
      } catch (err) {
        toast('Failed to load projects: ' + err.message, 'error');
      }
    }

    async function handleCreateProject(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-create-proj');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      try {
        await Projects.create({
          name: document.getElementById('proj-name').value,
          description: document.getElementById('proj-desc').value
        });
        closeModal('modal-new-project');
        document.getElementById('form-new-project').reset();
        toast('Project created!', 'success');
        loadProjects(); loadDashboard();
      } catch (err) {
        toast(err.message, 'error');
      } finally {
        btn.disabled = false; btn.innerHTML = 'Create Project';
      }
    }

    // Close modal on backdrop click
    document.getElementById('modal-new-project').addEventListener('click', function(e) {
      if (e.target === this) closeModal('modal-new-project');
    });

    // Add responsive CSS for chart layout
    const style = document.createElement('style');
    style.textContent = '@media(max-width:760px){.chart-layout{grid-template-columns:1fr!important;}}';
    document.head.appendChild(style);

    loadDashboard();
    loadProjects();
  </script>
</body>
</html>
